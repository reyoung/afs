syntax = "proto3";

package pagecache.v1;

option go_package = "github.com/reyoung/afs/pkg/pagecachepb;pagecachepb";

service PageCacheService {
  // Write a page to cache (client streaming for large pages).
  rpc PutPage(stream PutPageChunk) returns (PutPageResponse);

  // Read a page from cache. Returns disk location + lease on hit.
  rpc GetPage(GetPageRequest) returns (GetPageResponse);

  // Release a lease, allowing the block to be evicted.
  rpc Release(ReleaseRequest) returns (ReleaseResponse);

  // Batch read pages (reduces IPC roundtrips).
  rpc BatchGetPage(BatchGetPageRequest) returns (BatchGetPageResponse);

  // Batch release leases.
  rpc BatchRelease(BatchReleaseRequest) returns (BatchReleaseResponse);

  // Register client session for crash recovery.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Query cache statistics.
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
}

// --- PutPage (Client Streaming) ---

message PutPageChunk {
  PutPageHeader header = 1;  // Only in first chunk of stream
  bytes data = 2;            // Data fragment, recommended ≤64KB
}

message PutPageHeader {
  string digest = 1;         // Content digest, e.g. "sha256:af3b..."
  uint64 page_id = 2;        // Page number within the file
  uint32 total_size = 3;     // Total page size in bytes (for slab allocation)
}

message PutPageResponse {
  PutPageStatus status = 1;
}

enum PutPageStatus {
  PUT_PAGE_OK = 0;
  PUT_PAGE_ALREADY_EXISTS = 1;
  PUT_PAGE_NO_SPACE = 2;
  PUT_PAGE_INVALID = 3;
}

// --- GetPage ---

message GetPageRequest {
  string digest = 1;
  uint64 page_id = 2;
}

message GetPageResponse {
  GetPageStatus status = 1;
  string cache_file_path = 2;  // Chunk file path on disk
  uint64 cache_offset = 3;     // Byte offset within chunk file
  uint32 data_size = 4;        // Actual data size
  uint64 lease_id = 5;         // Lease ID for subsequent Release
}

enum GetPageStatus {
  CACHE_HIT = 0;
  CACHE_MISS = 1;
}

// --- Release ---

message ReleaseRequest {
  uint64 lease_id = 1;
}

message ReleaseResponse {}

// --- BatchGetPage ---

message BatchGetPageRequest {
  repeated GetPageRequest pages = 1;
}

message BatchGetPageResponse {
  repeated GetPageResponse pages = 1;
}

// --- BatchRelease ---

message BatchReleaseRequest {
  repeated uint64 lease_ids = 1;
}

message BatchReleaseResponse {}

// --- Register ---

message RegisterRequest {
  string client_id = 1;
}

message RegisterResponse {
  string session_id = 1;
}

// --- GetStats ---

message GetStatsRequest {}

message GetStatsResponse {
  uint64 total_pages = 1;
  uint64 total_bytes = 2;
  uint64 max_bytes = 3;
  uint64 hit_count = 4;
  uint64 miss_count = 5;
  uint32 active_leases = 6;
  uint32 connected_clients = 7;
}
