syntax = "proto3";

package layerstore.v1;

option go_package = "github.com/reyoung/afs/pkg/layerstorepb;layerstorepb";

service LayerStore {
  rpc EnsureLayers(EnsureLayersRequest) returns (EnsureLayersResponse);
  rpc StatLayer(StatLayerRequest) returns (StatLayerResponse);
  rpc ReadLayer(ReadLayerRequest) returns (ReadLayerResponse);
  rpc ReadLayerStream(ReadLayerRequest) returns (stream ReadLayerResponse);
  rpc HasLayer(HasLayerRequest) returns (HasLayerResponse);
  rpc PruneCache(PruneCacheRequest) returns (PruneCacheResponse);
}

message LayerSource {
  string registry = 1;
  string repository = 2;
}

message LayerSpec {
  string digest = 1;
  string media_type = 2;
  int64 compressed_size = 3;
}

message EnsureLayersRequest {
  LayerSource source = 1;
  repeated LayerSpec layers = 2;
}

message EnsureLayersResponse {
  repeated Layer layers = 1;
}

message Layer {
  string digest = 1;
  string media_type = 2;
  int64 compressed_size = 3;
  int64 afs_size = 4;
  string cache_path = 5;
  bool cached = 6;
}

message StatLayerRequest {
  string digest = 1;
}

message StatLayerResponse {
  string digest = 1;
  int64 afs_size = 2;
  string cache_path = 3;
}

message ReadLayerRequest {
  string digest = 1;
  int64 offset = 2;
  int32 length = 3;
}

message ReadLayerResponse {
  string digest = 1;
  int64 offset = 2;
  bytes data = 3;
  bool eof = 4;
}

message HasLayerRequest {
  string digest = 1;
}

message HasLayerResponse {
  string digest = 1;
  bool found = 2;
  int64 afs_size = 3;
}

message PruneCacheRequest {
  // Percentage of current cache bytes to reclaim, range (0, 100].
  double percent = 1;
}

message PruneCacheResponse {
  int64 before_bytes = 1;
  int64 after_bytes = 2;
  int64 reclaimed_bytes = 3;
  int32 evicted_layers = 4;
}
