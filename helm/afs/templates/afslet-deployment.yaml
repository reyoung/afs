apiVersion: apps/v1
kind: {{ if .Values.afslet.daemonSet }}DaemonSet{{ else }}Deployment{{ end }}
metadata:
  name: {{ include "afs.afsletName" . }}
  labels:
    {{- include "afs.labels" . | nindent 4 }}
    app.kubernetes.io/component: afslet
spec:
  {{- if not .Values.afslet.daemonSet }}
  replicas: {{ .Values.afslet.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "afs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: afslet
  template:
    metadata:
      labels:
        {{- include "afs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: afslet
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.afslet.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.afslet.spreadAcrossNodes.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.afslet.spreadAcrossNodes.weight }}
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "afs.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: afslet
      {{- end }}
      containers:
        - name: afslet
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/afslet
          args:
            - -listen=:{{ .Values.afslet.containerPort }}
            - -mount-in-process={{ .Values.afslet.mountInProcess }}
            - -mount-binary={{ .Values.afslet.mountBinary }}
            - -runc-binary={{ .Values.afslet.runcBinary }}
            - -runc-no-pivot={{ .Values.afslet.runcNoPivot }}
            - -runc-no-new-keyring={{ .Values.afslet.runcNoNewKeyring }}
            - -runc-no-cgroup-ns={{ .Values.afslet.runcNoCgroupNS }}
            - -runc-no-pid-ns={{ .Values.afslet.runcNoPIDNS }}
            - -runc-no-ipc-ns={{ .Values.afslet.runcNoIPCNS }}
            - -runc-no-uts-ns={{ .Values.afslet.runcNoUTSNS }}
            - -sudo-binaries={{ .Values.afslet.sudoBinaries }}
            - -tar-chunk={{ .Values.afslet.tarChunk }}
            - -graceful-timeout={{ .Values.afslet.gracefulTimeout }}
            - -discovery-addr={{ include "afs.discoveryHeadlessServiceName" . }}:{{ .Values.discovery.service.port }}
            - -temp-dir={{ .Values.afslet.tempDir }}
            - -limit-cpu={{ .Values.afslet.limitCPUCores }}
            - -limit-memory-mb={{ .Values.afslet.limitMemoryMB }}
            {{- if .Values.afslet.sharedSpillCache.enabled }}
            - -shared-spill-cache=true
            - -shared-spill-cache-dir={{ .Values.afslet.sharedSpillCache.dir }}
            {{- if .Values.afslet.sharedSpillCache.sock }}
            - -shared-spill-cache-sock={{ .Values.afslet.sharedSpillCache.sock }}
            {{- end }}
            - -shared-spill-cache-max-bytes={{ .Values.afslet.sharedSpillCache.maxBytes }}
            - -shared-spill-cache-binary={{ .Values.afslet.sharedSpillCache.binary }}
            {{- end }}
          env:
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  containerName: afslet
                  resource: limits.cpu
                  divisor: "1"
          ports:
            - name: grpc
              containerPort: {{ .Values.afslet.containerPort }}
              protocol: TCP
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - name: tmp
              mountPath: {{ .Values.afslet.tempDir }}
            - name: work
              mountPath: {{ .Values.afslet.workDir }}
            {{- if .Values.afslet.sharedSpillCache.enabled }}
            - name: spillcache
              mountPath: {{ .Values.afslet.sharedSpillCache.dir }}
            {{- end }}
            - name: cgroupfs
              mountPath: /sys/fs/cgroup
            - name: fuse-dev
              mountPath: /dev/fuse
          resources:
            {{- toYaml .Values.afslet.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: work
          emptyDir: {}
        {{- if and .Values.afslet.sharedSpillCache.enabled (eq .Values.afslet.spillCacheVolume.type "emptyDir") }}
        - name: spillcache
          emptyDir:
            {{- toYaml .Values.afslet.spillCacheVolume.emptyDir | nindent 12 }}
        {{- end }}
        {{- if and .Values.afslet.sharedSpillCache.enabled (eq .Values.afslet.spillCacheVolume.type "hostPath") }}
        - name: spillcache
          hostPath:
            path: {{ .Values.afslet.spillCacheVolume.hostPath | quote }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if and .Values.afslet.sharedSpillCache.enabled (not (or (eq .Values.afslet.spillCacheVolume.type "emptyDir") (eq .Values.afslet.spillCacheVolume.type "hostPath"))) }}
        {{- fail "afslet.spillCacheVolume.type must be one of: emptyDir, hostPath" }}
        {{- end }}
        - name: cgroupfs
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: fuse-dev
          hostPath:
            path: /dev/fuse
            type: CharDevice
