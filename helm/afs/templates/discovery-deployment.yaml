apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "afs.discoveryServiceName" . }}
  labels:
    {{- include "afs.labels" . | nindent 4 }}
    app.kubernetes.io/component: discovery
spec:
  replicas: {{ .Values.discovery.replicas }}
  selector:
    matchLabels:
      {{- include "afs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: discovery
  template:
    metadata:
      labels:
        {{- include "afs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: discovery
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: discovery
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -listen=:{{ .Values.discovery.containerPort }}
            {{- if .Values.discovery.registryAuth.enabled }}
            {{- if eq (trim .Values.discovery.registryAuth.registry) "" }}
            {{- fail "discovery.registryAuth.registry must be non-empty when discovery.registryAuth.enabled=true" }}
            {{- end }}
            {{- if eq (trim .Values.discovery.registryAuth.existingSecret) "" }}
            {{- fail "discovery.registryAuth.existingSecret must be non-empty when discovery.registryAuth.enabled=true" }}
            {{- end }}
            {{- if eq (trim .Values.discovery.registryAuth.usernameKey) "" }}
            {{- fail "discovery.registryAuth.usernameKey must be non-empty when discovery.registryAuth.enabled=true" }}
            {{- end }}
            {{- if eq (trim .Values.discovery.registryAuth.passwordKey) "" }}
            {{- fail "discovery.registryAuth.passwordKey must be non-empty when discovery.registryAuth.enabled=true" }}
            {{- end }}
            - -auth-registry-basic={{ .Values.discovery.registryAuth.registry }}=$(REGISTRY_USERNAME):$(REGISTRY_PASSWORD)
            {{- end }}
            {{- range .Values.discovery.registryMirrors }}
            - -registry-mirror={{ . }}
            {{- end }}
          command:
            - /usr/local/bin/afs_discovery_grpcd
          env:
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  containerName: discovery
                  resource: limits.cpu
                  divisor: "1"
            - name: GOMEMLIMIT
              value: "{{ .Values.discovery.goMemLimit }}"
            {{- if .Values.discovery.registryAuth.enabled }}
            - name: REGISTRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.discovery.registryAuth.existingSecret | quote }}
                  key: {{ .Values.discovery.registryAuth.usernameKey | quote }}
            - name: REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.discovery.registryAuth.existingSecret | quote }}
                  key: {{ .Values.discovery.registryAuth.passwordKey | quote }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.discovery.containerPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.discovery.resources | nindent 12 }}
