x-afs-runtime-env: &afs-runtime-env
  AFS_DISCOVERY_READER_LOG_INTERVAL: ${AFS_DISCOVERY_READER_LOG_INTERVAL:-0s}
  AFS_DISCOVERY_READER_LOG_MIN_CALLS: ${AFS_DISCOVERY_READER_LOG_MIN_CALLS:-128}
  AFS_DISCOVERY_READER_LOG_MIN_BYTES: ${AFS_DISCOVERY_READER_LOG_MIN_BYTES:-33554432}

x-afs-runtime: &afs-runtime
  image: afs-local:compose
  pull_policy: never
  environment: *afs-runtime-env

x-layerstore-common: &layerstore-common
  <<: *afs-runtime
  restart: unless-stopped
  depends_on:
    - discovery
  env_file:
    - .env.layerstore
  entrypoint: ["/bin/bash", "-lc"]
  command:
    - |
      set -euo pipefail
      update-ca-certificates >/dev/null 2>&1 || true
      IP="$(hostname -i | awk '{print $1}')"
      echo "layerstore listen ip=$$IP node_id=$${LAYERSTORE_NODE_ID}"
      AUTH_ARGS=()
      if [[ -n "$${LAYERSTORE_AUTH_REGISTRY_1:-}" && -n "$${LAYERSTORE_AUTH_TOKEN_1:-}" ]]; then
        AUTH_ARGS+=(-auth-registry-token "$${LAYERSTORE_AUTH_REGISTRY_1}=$${LAYERSTORE_AUTH_TOKEN_1}")
      fi
      if [[ -n "$${LAYERSTORE_AUTH_REGISTRY_2:-}" && -n "$${LAYERSTORE_AUTH_TOKEN_2:-}" ]]; then
        AUTH_ARGS+=(-auth-registry-token "$${LAYERSTORE_AUTH_REGISTRY_2}=$${LAYERSTORE_AUTH_TOKEN_2}")
      fi
      if [[ -n "$${LAYERSTORE_AUTH_REGISTRY_3:-}" && -n "$${LAYERSTORE_AUTH_TOKEN_3:-}" ]]; then
        AUTH_ARGS+=(-auth-registry-token "$${LAYERSTORE_AUTH_REGISTRY_3}=$${LAYERSTORE_AUTH_TOKEN_3}")
      fi
      if [[ -n "$${LAYERSTORE_AUTH_BASIC_1:-}" ]]; then
        AUTH_ARGS+=(-auth-registry-basic "$${LAYERSTORE_AUTH_BASIC_1}")
      fi
      if [[ -n "$${LAYERSTORE_AUTH_BASIC_2:-}" ]]; then
        AUTH_ARGS+=(-auth-registry-basic "$${LAYERSTORE_AUTH_BASIC_2}")
      fi
      if [[ -n "$${LAYERSTORE_AUTH_BASIC_3:-}" ]]; then
        AUTH_ARGS+=(-auth-registry-basic "$${LAYERSTORE_AUTH_BASIC_3}")
      fi
      exec /usr/local/bin/afs_layerstore_grpcd \
        -listen="$$IP:50051" \
        -cache-dir=/var/lib/afs/cache \
        -node-id="$${LAYERSTORE_NODE_ID}" \
        -discovery-endpoint=discovery:60051 \
        -pprof-listen="$${LAYERSTORE_PPROF_LISTEN}" \
        "$${AUTH_ARGS[@]}"
  networks:
    - afsnet

x-afslet-common: &afslet-common
  <<: *afs-runtime
  restart: unless-stopped
  cgroup: host
  depends_on:
    discovery:
      condition: service_started
    layerstore:
      condition: service_started
    layerstore2:
      condition: service_started
    layerstore3:
      condition: service_started
    page_cache:
      condition: service_started
      required: false
  privileged: true
  cap_add:
    - SYS_ADMIN
  security_opt:
    - apparmor:unconfined
  devices:
    - /dev/fuse:/dev/fuse
  environment:
    <<: *afs-runtime-env
    AFSLET_LAYER_MOUNT_CONCURRENCY: ${AFSLET_LAYER_MOUNT_CONCURRENCY:-1}
    AFSLET_MOUNT_IN_PROCESS: ${AFSLET_MOUNT_IN_PROCESS:-false}
    AFS_PAGE_CACHE_ENABLED: ${AFS_PAGE_CACHE_ENABLED:-true}
  entrypoint: ["/bin/bash", "-lc"]

services:
  discovery:
    <<: *afs-runtime
    container_name: afs-discovery
    restart: unless-stopped
    env_file:
      - .env.layerstore
    # Optional: mount custom root CAs when using private/self-signed registry certs.
    # volumes:
    #   - ./certs:/usr/local/share/ca-certificates/custom:ro
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -euo pipefail
        update-ca-certificates >/dev/null 2>&1 || true
        AUTH_ARGS=()
        if [[ -n "$${LAYERSTORE_AUTH_REGISTRY_1:-}" && -n "$${LAYERSTORE_AUTH_TOKEN_1:-}" ]]; then
          AUTH_ARGS+=(-auth-registry-token "$${LAYERSTORE_AUTH_REGISTRY_1}=$${LAYERSTORE_AUTH_TOKEN_1}")
        fi
        if [[ -n "$${LAYERSTORE_AUTH_REGISTRY_2:-}" && -n "$${LAYERSTORE_AUTH_TOKEN_2:-}" ]]; then
          AUTH_ARGS+=(-auth-registry-token "$${LAYERSTORE_AUTH_REGISTRY_2}=$${LAYERSTORE_AUTH_TOKEN_2}")
        fi
        if [[ -n "$${LAYERSTORE_AUTH_REGISTRY_3:-}" && -n "$${LAYERSTORE_AUTH_TOKEN_3:-}" ]]; then
          AUTH_ARGS+=(-auth-registry-token "$${LAYERSTORE_AUTH_REGISTRY_3}=$${LAYERSTORE_AUTH_TOKEN_3}")
        fi
        if [[ -n "$${LAYERSTORE_AUTH_BASIC_1:-}" ]]; then
          AUTH_ARGS+=(-auth-registry-basic "$${LAYERSTORE_AUTH_BASIC_1}")
        fi
        if [[ -n "$${LAYERSTORE_AUTH_BASIC_2:-}" ]]; then
          AUTH_ARGS+=(-auth-registry-basic "$${LAYERSTORE_AUTH_BASIC_2}")
        fi
        if [[ -n "$${LAYERSTORE_AUTH_BASIC_3:-}" ]]; then
          AUTH_ARGS+=(-auth-registry-basic "$${LAYERSTORE_AUTH_BASIC_3}")
        fi
        exec /usr/local/bin/afs_discovery_grpcd \
          -listen=:60051 \
          -pprof-listen=:6064 \
          "$${AUTH_ARGS[@]}"
    ports:
      - "60051:60051"
      - "16064:6064"
    networks:
      - afsnet

  page_cache:
    <<: *afs-runtime
    container_name: afs-page-cache
    restart: unless-stopped
    profiles:
      - page-cache
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -euo pipefail
        exec /usr/local/bin/afs_page_cached \
          -cache-dir=/var/cache/afs-page-cache \
          -max-cache-size=$${AFS_PAGE_CACHE_MAX_SIZE:-8GB} \
          -uds-path=/var/run/afs-page-cache/page-cache.sock \
          -lease-timeout=30s \
          -pprof-listen=:6090
    environment:
      <<: *afs-runtime-env
      AFS_PAGE_CACHE_MAX_SIZE: ${AFS_PAGE_CACHE_MAX_SIZE:-8GB}
    volumes:
      - page_cache_data:/var/cache/afs-page-cache
      - page_cache_sock:/var/run/afs-page-cache
    ports:
      - "16090:6090"
    networks:
      - afsnet

  layerstore:
    <<: *layerstore-common
    container_name: afs-layerstore-1
    environment:
      <<: *afs-runtime-env
      LAYERSTORE_NODE_ID: layerstore-1
      LAYERSTORE_PPROF_LISTEN: :6063
    volumes:
      - layerstore_cache:/var/lib/afs/cache
      # Optional: mount custom root CAs when using private/self-signed registry certs.
      # - ./certs:/usr/local/share/ca-certificates/custom:ro
    ports:
      - "16063:6063"

  layerstore2:
    <<: *layerstore-common
    container_name: afs-layerstore-2
    environment:
      <<: *afs-runtime-env
      LAYERSTORE_NODE_ID: layerstore-2
      LAYERSTORE_PPROF_LISTEN: :6063
    volumes:
      - layerstore_cache_2:/var/lib/afs/cache
      # Optional: mount custom root CAs when using private/self-signed registry certs.
      # - ./certs:/usr/local/share/ca-certificates/custom:ro
    ports:
      - "16065:6063"

  layerstore3:
    <<: *layerstore-common
    container_name: afs-layerstore-3
    environment:
      <<: *afs-runtime-env
      LAYERSTORE_NODE_ID: layerstore-3
      LAYERSTORE_PPROF_LISTEN: :6063
    volumes:
      - layerstore_cache_3:/var/lib/afs/cache
      # Optional: mount custom root CAs when using private/self-signed registry certs.
      # - ./certs:/usr/local/share/ca-certificates/custom:ro
    ports:
      - "16066:6063"

  afslet:
    <<: *afslet-common
    container_name: afs-afslet-1
    volumes:
      - afslet_tmp:/var/lib/afslet/tmp
      - afslet_work:/var/lib/afslet/work
      - page_cache_sock:/var/run/afs-page-cache
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command:
      - |
        set -euo pipefail
        PAGE_CACHE_ARGS=()
        if [[ "$${AFS_PAGE_CACHE_ENABLED:-true}" == "true" ]]; then
          PAGE_CACHE_ARGS+=(-page-cache-uds /var/run/afs-page-cache/page-cache.sock)
        fi
        exec /usr/local/bin/afslet \
          -listen=:61051 \
          -mount-in-process=$${AFSLET_MOUNT_IN_PROCESS:-false} \
          -mount-binary=/usr/local/bin/afs_mount \
          -runc-binary=/usr/local/bin/afs_runc \
          -discovery-addr=discovery:60051 \
          -temp-dir=/var/lib/afslet/tmp \
          -limit-cpu=4 \
          -limit-memory-mb=4096 \
          -layer-mount-concurrency=$${AFSLET_LAYER_MOUNT_CONCURRENCY:-1} \
          -pprof-listen=:6062 \
          -graceful-timeout=15s \
          "$${PAGE_CACHE_ARGS[@]}"
    ports:
      - "61051:61051"
      - "16062:6062"
    networks:
      afsnet:
        aliases:
          - afslet

  afslet2:
    <<: *afslet-common
    container_name: afs-afslet-2
    volumes:
      - afslet_tmp_2:/var/lib/afslet/tmp
      - afslet_work_2:/var/lib/afslet/work
      - page_cache_sock:/var/run/afs-page-cache
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command:
      - |
        set -euo pipefail
        PAGE_CACHE_ARGS=()
        if [[ "$${AFS_PAGE_CACHE_ENABLED:-true}" == "true" ]]; then
          PAGE_CACHE_ARGS+=(-page-cache-uds /var/run/afs-page-cache/page-cache.sock)
        fi
        exec /usr/local/bin/afslet \
          -listen=:61051 \
          -mount-in-process=$${AFSLET_MOUNT_IN_PROCESS:-false} \
          -mount-binary=/usr/local/bin/afs_mount \
          -runc-binary=/usr/local/bin/afs_runc \
          -discovery-addr=discovery:60051 \
          -temp-dir=/var/lib/afslet/tmp \
          -limit-cpu=4 \
          -limit-memory-mb=4096 \
          -layer-mount-concurrency=$${AFSLET_LAYER_MOUNT_CONCURRENCY:-1} \
          -pprof-listen=:6072 \
          -graceful-timeout=15s \
          "$${PAGE_CACHE_ARGS[@]}"
    ports:
      - "61052:61051"
      - "16072:6072"
    networks:
      afsnet:
        aliases:
          - afslet

  afslet3:
    <<: *afslet-common
    container_name: afs-afslet-3
    volumes:
      - afslet_tmp_3:/var/lib/afslet/tmp
      - afslet_work_3:/var/lib/afslet/work
      - page_cache_sock:/var/run/afs-page-cache
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command:
      - |
        set -euo pipefail
        PAGE_CACHE_ARGS=()
        if [[ "$${AFS_PAGE_CACHE_ENABLED:-true}" == "true" ]]; then
          PAGE_CACHE_ARGS+=(-page-cache-uds /var/run/afs-page-cache/page-cache.sock)
        fi
        exec /usr/local/bin/afslet \
          -listen=:61051 \
          -mount-in-process=$${AFSLET_MOUNT_IN_PROCESS:-false} \
          -mount-binary=/usr/local/bin/afs_mount \
          -runc-binary=/usr/local/bin/afs_runc \
          -discovery-addr=discovery:60051 \
          -temp-dir=/var/lib/afslet/tmp \
          -limit-cpu=4 \
          -limit-memory-mb=4096 \
          -layer-mount-concurrency=$${AFSLET_LAYER_MOUNT_CONCURRENCY:-1} \
          -pprof-listen=:6082 \
          -graceful-timeout=15s \
          "$${PAGE_CACHE_ARGS[@]}"
    ports:
      - "61053:61051"
      - "16082:6082"
    networks:
      afsnet:
        aliases:
          - afslet

  afs_proxy:
    <<: *afs-runtime
    restart: unless-stopped
    depends_on:
      - afslet
      - afslet2
      - afslet3
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -euo pipefail
        exec /usr/local/bin/afs_proxy \
          -listen=:62051 \
          -http-listen=:62052 \
          -afslet-target=afslet:61051 \
          -discovery-target=discovery:60051 \
          -proxy-peers-target=afs_proxy:62052 \
          -dispatch-backoff=50ms
    ports:
      - "62051:62051"
    networks:
      - afsnet

networks:
  afsnet:
    driver: bridge

volumes:
  layerstore_cache:
  layerstore_cache_2:
  layerstore_cache_3:
  afslet_tmp:
  afslet_work:
  afslet_tmp_2:
  afslet_work_2:
  afslet_tmp_3:
  afslet_work_3:
  page_cache_data:
  page_cache_sock:
